version: '3.8'
services:
  app:
    build: .
    ports:
      - "8000:8000"
    env_file:
      - .env
    depends_on:
      - postgres
      - qdrant

  postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: genesis_user
      POSTGRES_PASSWORD: genesis_password
      POSTGRES_DB: genesis_db
    ports:
      - "5432:5432"

  qdrant:
    image: qdrant/qdrant:latest
    ports:
      - "6333:6333"